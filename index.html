<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Budget Tracker</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Critical CSS for instant render */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(to bottom right, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
            padding: 16px;
            padding-left: max(16px, env(safe-area-inset-left));
            padding-right: max(16px, env(safe-area-inset-right));
            overflow-x: hidden;
            width: 100%;
            max-width: 100vw;
        }
        .container { max-width: 600px; margin: 0 auto; width: 100%; }
        h1 { text-align: center; font-size: 28px; margin-bottom: 24px; }
    </style>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Coin accumulator overlay -->
    <div id="coinAccumOverlay" class="coin-accum-overlay">
        <div class="coin-accum-card">
            <div class="coin-accum-top">
                <span class="coin-accum-category" id="coinAccumCategory">In Food</span>
                <button class="coin-accum-cancel" id="coinAccumCancel">✕</button>
            </div>
            <div class="coin-accum-amount" id="coinAccumAmount">€0</div>
            <div class="coin-accum-timer-bar">
                <div class="coin-accum-timer-fill" id="coinAccumTimerFill"></div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>Budget Tracker</h1>
            <div class="header-buttons">
                <button class="header-button sync-button" id="syncBtn" onclick="exportToURLHash()" title="Sync via URL">🔗</button>
                <button class="header-button settings-button" id="settingsBtn" title="Settings">⚙️</button>
            </div>
        </div>

        <!-- Budget Bar Chart -->
        <div class="budget-chart">
            <div class="budget-bar-container" id="budgetBar">
                <div class="budget-segment bills" id="bills-segment" data-segment="bills">
                    <span class="seg-label">Bills</span>
                    <span class="seg-amount">€0</span>
                </div>
                <div class="budget-segment specials" id="specials-segment" data-segment="specials">
                    <span class="seg-label">Specials</span>
                    <span class="seg-amount">€0</span>
                </div>
                <div class="budget-segment daily active" id="daily-segment" data-segment="daily">
                    <div class="daily-header">
                        <span class="seg-label">Daily</span>
                        <span class="seg-amount">€0</span>
                    </div>
                    <div class="category-breakdown" id="categoryBreakdown"></div>
                </div>
            </div>
            <div class="budget-info">
                <span>Total: €<span id="totalBudget">0</span></span>
                <span>30-day: <span id="thirtyDaySpend">€0</span></span>
            </div>
            <div id="dailyIndicator" class="daily-indicator" style="display:none">
                <div class="daily-indicator-bar-wrap">
                    <div class="daily-indicator-fill" id="dailyIndicatorFill"></div>
                    <div class="daily-indicator-marker" id="dailyIndicatorMarker"></div>
                </div>
                <div class="daily-indicator-text" id="dailyIndicatorText"></div>
            </div>
        </div>

        <!-- Quick Entry -->
        <div class="quick-entry">
            <div class="selected-segment-label" id="selectedLabel">Daily Expense</div>
            <div class="transaction-type-toggle">
                <button class="toggle-button active" id="expenseBtn" data-type="expense">Expense</button>
                <button class="toggle-button" id="incomeBtn" data-type="income">Income</button>
            </div>

            <!-- Digit entry area (shown for bills/specials, and for custom coin amount) -->
            <div id="digitEntryArea" style="display:none">
                <div class="amount-input-container">
                    <input type="text" id="amountInput" class="amount-input" placeholder="0" readonly>
                    <button class="clear-button" id="clearBtn">✕</button>
                </div>
                <div class="digit-grid" id="digitGrid">
                    <button class="digit-button" data-digit="1">1</button>
                    <button class="digit-button" data-digit="2">2</button>
                    <button class="digit-button" data-digit="3">3</button>
                    <button class="digit-button" data-digit="4">4</button>
                    <button class="digit-button" data-digit="5">5</button>
                    <button class="digit-button" data-digit="6">6</button>
                    <button class="digit-button" data-digit="7">7</button>
                    <button class="digit-button" data-digit="8">8</button>
                    <button class="digit-button" data-digit="9">9</button>
                    <button class="digit-button" data-digit="0">0</button>
                </div>
            </div>

            <!-- Coin category grid (shown for daily segment) -->
            <div id="coinCategoryGrid" class="coin-category-grid">
                <div class="coin-row">
                    <span class="coin-cat-label in-food">In Food</span>
                    <div class="coin-set">
                        <button class="coin in-food" data-category="In Food" data-amount="1">1€</button>
                        <button class="coin in-food" data-category="In Food" data-amount="2">2€</button>
                        <button class="coin in-food" data-category="In Food" data-amount="5">5€</button>
                        <button class="coin coin-x in-food" data-category="In Food" data-amount="x">X€</button>
                    </div>
                </div>
                <div class="coin-row">
                    <span class="coin-cat-label out-food">Out Food</span>
                    <div class="coin-set">
                        <button class="coin out-food" data-category="Out Food" data-amount="1">1€</button>
                        <button class="coin out-food" data-category="Out Food" data-amount="2">2€</button>
                        <button class="coin out-food" data-category="Out Food" data-amount="5">5€</button>
                        <button class="coin coin-x out-food" data-category="Out Food" data-amount="x">X€</button>
                    </div>
                </div>
                <div class="coin-row">
                    <span class="coin-cat-label shopping">Shopping</span>
                    <div class="coin-set">
                        <button class="coin shopping" data-category="Shopping" data-amount="1">1€</button>
                        <button class="coin shopping" data-category="Shopping" data-amount="2">2€</button>
                        <button class="coin shopping" data-category="Shopping" data-amount="5">5€</button>
                        <button class="coin coin-x shopping" data-category="Shopping" data-amount="x">X€</button>
                    </div>
                </div>
                <div class="coin-row">
                    <span class="coin-cat-label entertainment">Entertain.</span>
                    <div class="coin-set">
                        <button class="coin entertainment" data-category="Entertainment" data-amount="1">1€</button>
                        <button class="coin entertainment" data-category="Entertainment" data-amount="2">2€</button>
                        <button class="coin entertainment" data-category="Entertainment" data-amount="5">5€</button>
                        <button class="coin coin-x entertainment" data-category="Entertainment" data-amount="x">X€</button>
                    </div>
                </div>
                <div class="coin-row">
                    <span class="coin-cat-label others">Others</span>
                    <div class="coin-set">
                        <button class="coin others" data-category="Others" data-amount="1">1€</button>
                        <button class="coin others" data-category="Others" data-amount="2">2€</button>
                        <button class="coin others" data-category="Others" data-amount="5">5€</button>
                        <button class="coin coin-x others" data-category="Others" data-amount="x">X€</button>
                    </div>
                </div>
            </div>

            <!-- Custom coin confirm (shown when X coin is tapped) -->
            <button id="customCoinConfirm" class="custom-coin-confirm" style="display:none">
                Log to <span id="customCoinCategorySpan"></span>
            </button>

            <button id="labelButton" class="label-button" style="display: none;">Add Label & Save</button>
        </div>

        <!-- Expenses List -->
        <div class="expenses-list" id="expensesList"></div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Budget Settings</h2>
                <button class="close-button" id="closeSettings">✕</button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label>Bills & Subscriptions</label>
                    <input type="number" id="billsInput" class="setting-input" step="1">
                </div>
                <div class="setting-item">
                    <label>Monthly Specials Budget</label>
                    <input type="number" id="specialsInput" class="setting-input" step="1">
                </div>
                <div class="setting-item">
                    <label>Daily Discretionary Budget</label>
                    <input type="number" id="dailyInput" class="setting-input" step="1">
                </div>
                <div class="setting-item setting-item--sheets">
                    <label>Google Sheets Script URL
                        <span class="setting-hint">Paste your Apps Script web app URL to enable cloud sync</span>
                    </label>
                    <input type="url" id="sheetsUrlInput" class="setting-input" placeholder="https://script.google.com/macros/s/…/exec">
                </div>
                <div class="sheets-actions">
                    <button class="modal-button secondary" id="pullFromSheetsBtn">Pull from Sheets</button>
                    <span class="sheets-sync-status" id="sheetsSyncStatus"></span>
                </div>
                <button class="modal-button primary" id="saveSettings">Save Settings</button>
                <button class="modal-button danger" id="deleteAllData">Delete All Data</button>
            </div>
        </div>
    </div>

    <!-- Label Modal -->
    <div id="labelModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="labelModalTitle">Add Description</h2>
                <button class="close-button" id="closeLabelModal">✕</button>
            </div>
            <div class="modal-body">
                <input type="text" id="labelInput" class="setting-input" placeholder="Enter description...">
                <button class="modal-button primary" id="saveLabelExpense">Save</button>
            </div>
        </div>
    </div>

    <script src="sheets-sync.js" defer></script>
    <script src="app.js" defer></script>
</body>
</html>
